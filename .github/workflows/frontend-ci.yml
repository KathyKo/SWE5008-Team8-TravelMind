name: frontend-ci

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - ".github/workflows/frontend-cd.yml"
      - "frontend/requirements.txt"
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - ".github/workflows/frontend-cd.yml"
      - "frontend/requirements.txt"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: frontend-tests
    runs-on: ubuntu-latest
    if: ${{ vars.CI_CD_DISABLED != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: frontend/requirements.txt

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-frontend-${{ hashFiles('frontend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-frontend-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r frontend/requirements.txt

      - name: Lint frontend code
        run: |
          python -m pip install ruff
          ruff check frontend frontend/tests

      - name: Compile frontend code
        run: |
          python -m compileall frontend

      - name: Run frontend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/frontend
        run: |
          python -m pytest -q frontend/tests \
            --junitxml=frontend-test-results.xml \
            --cov=frontend \
            --cov-report=xml:frontend-coverage.xml \
            --cov-report=term-missing

      - name: Publish frontend test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Test Results
          path: frontend-test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Extract frontend coverage
        if: always()
        id: frontend_coverage
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          output = os.environ["GITHUB_OUTPUT"]
          path = "frontend-coverage.xml"
          rate = 0.0
          if os.path.exists(path):
              root = ET.parse(path).getroot()
              rate = float(root.attrib.get("line-rate", 0.0)) * 100
          with open(output, "a", encoding="utf-8") as f:
              f.write(f"rate={rate:.2f}\n")
          PY

      - name: Add frontend coverage to job summary
        if: always()
        run: |
          echo "### Frontend Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "- Line coverage: **${{ steps.frontend_coverage.outputs.rate }}%**" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          load: true
          tags: travelmind-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: travelmind-frontend:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Extract metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/travelmind-frontend
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image
