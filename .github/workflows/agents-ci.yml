name: agents-ci

on:
  push:
    branches: ["main"]
    paths:
      - "agents/**"
      - "tools/**"
      - ".github/workflows/agents-ci.yml"
      - ".github/workflows/agents-cd.yml"
      - "agents/requirements.txt"
  pull_request:
    branches: ["main"]
    paths:
      - "agents/**"
      - "tools/**"
      - ".github/workflows/agents-ci.yml"
      - ".github/workflows/agents-cd.yml"
      - "agents/requirements.txt"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: agents-tests
    runs-on: ubuntu-latest
    if: ${{ vars.CI_CD_DISABLED != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: agents/requirements.txt

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-agents-${{ hashFiles('agents/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-agents-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r agents/requirements.txt

      - name: Lint agents code
        run: |
          python -m pip install ruff
          ruff check agents tools

      - name: Compile agents code
        run: |
          python -m compileall agents tools

      - name: Run agents tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest -q agents/tests/security \
            --junitxml=agents-test-results.xml \
            --cov=agents \
            --cov-report=xml:agents-coverage.xml \
            --cov-report=term-missing

      - name: Publish agents test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Agents Test Results
          path: agents-test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Extract agents coverage
        if: always()
        id: agents_coverage
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          output = os.environ["GITHUB_OUTPUT"]
          path = "agents-coverage.xml"
          rate = 0.0
          if os.path.exists(path):
              root = ET.parse(path).getroot()
              rate = float(root.attrib.get("line-rate", 0.0)) * 100
          with open(output, "a", encoding="utf-8") as f:
              f.write(f"rate={rate:.2f}\n")
          PY

      - name: Add agents coverage to job summary
        if: always()
        run: |
          echo "### Agents Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "- Line coverage: **${{ steps.agents_coverage.outputs.rate }}%**" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agents Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agents/Dockerfile
          load: true
          tags: travelmind-agents:${{ github.sha }}
          cache-from: type=gha,scope=agents-image
          cache-to: type=gha,mode=max,scope=agents-image

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: travelmind-agents:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Extract metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/travelmind-agents
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agents/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agents-image
          cache-to: type=gha,mode=max,scope=agents-image