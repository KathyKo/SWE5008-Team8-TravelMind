name: backend-cd

on:
  workflow_run:
    workflows: ["backend-ci"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. feature-cicd_setup, latest, sha-abc1234)'
        required: false
        default: 'latest'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: backend-deploy
    runs-on: ubuntu-latest
    if: ${{ vars.CI_CD_DISABLED != 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')) }}
    steps:
      - name: Set image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            FULL_SHA="${{ github.event.workflow_run.head_sha }}"
            SHORT_SHA="${FULL_SHA:0:7}"
            echo "tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "Deploying backend image tag: sha-${SHORT_SHA}"
          else
            TAG="${{ github.event.inputs.image_tag }}"
            TAG="${TAG:-latest}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "Deploying backend image tag: ${TAG}"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition travelmind-backend \
            --query taskDefinition \
            | jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            > task-def.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ secrets.BACKEND_CONTAINER_NAME }}
          image: ${{ secrets.DOCKERHUB_USERNAME }}/travelmind-backend:${{ steps.image.outputs.tag }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.BACKEND_ECS_SERVICE }}
          cluster: ${{ secrets.BACKEND_ECS_CLUSTER }}
          wait-for-service-stability: true
