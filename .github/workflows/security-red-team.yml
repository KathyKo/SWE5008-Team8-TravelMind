name: security-red-team-e2e

on:
  push:
  schedule:
    - cron: "0 2 * * 1"   # Every Monday at 02:00 UTC
  workflow_dispatch:
    inputs:
      agents_url:
        description: "Agents service URL (leave blank to spin up locally via docker compose)"
        required: false
        default: ""

permissions:
  contents: read
  checks: write

jobs:
  red-team:
    name: Red Team E2E
    runs-on: ubuntu-latest
    if: ${{ vars.SECURITY_RED_TEAM_DISABLED != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r agents/requirements.txt

      - name: Start agents service (docker compose)
        if: ${{ inputs.agents_url == '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          docker compose up -d agents
          echo "AGENTS_URL=http://localhost:8001" >> "$GITHUB_ENV"

      - name: Use provided agents URL
        if: ${{ inputs.agents_url != '' }}
        run: echo "AGENTS_URL=${{ inputs.agents_url }}" >> "$GITHUB_ENV"

      - name: Wait for agents health check
        run: |
          echo "Waiting for agents at $AGENTS_URL ..."
          for i in $(seq 1 60); do
            if curl -sf "$AGENTS_URL/health"; then
              echo "Agents ready after $i attempt(s)"
              exit 0
            fi
            echo "Attempt $i/60 — retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Agents service did not become healthy within 300s" && exit 1

      - name: Run red team e2e tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m pytest agents/tests/security/test_red_team_e2e.py \
            -m red_team_e2e \
            --junitxml=red-team-results.xml \
            -v --tb=short

      - name: Publish red team test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Red Team E2E Results
          path: red-team-results.xml
          reporter: java-junit
          fail-on-error: false
