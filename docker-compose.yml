version: "3.9"

# Python 3.12 — see frontend/Dockerfile and backend/Dockerfile
# Usage: docker compose up --build
# Requires: .env file at project root (copy from .env.example)

services:

  agents:
    build:
      context: .
      dockerfile: ./agents/Dockerfile
    container_name: travelmind-agents
    ports:
      - "8001:8001"
    expose:
      - "8001"
      - "8100"
      - "8101"
      - "8102"
      - "8103"
      - "8104"
      - "8105"
      - "8106"
      - "8107"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - travelmind-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: travelmind-frontend
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - travelmind-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: travelmind-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - AGENTS_BASE_URL=http://agents:8001
    depends_on:
      agents:
        condition: service_healthy
    networks:
      - travelmind-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

